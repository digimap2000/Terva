syntax = "proto3";

package terva.project.v1;

import "google/protobuf/struct.proto";

enum McpTransport {
  MCP_TRANSPORT_UNSPECIFIED = 0;
  MCP_TRANSPORT_STREAMABLE_HTTP = 1;
  MCP_TRANSPORT_STDIO = 2;
}

enum HttpMethod {
  HTTP_METHOD_UNSPECIFIED = 0;
  HTTP_METHOD_GET = 1;
  HTTP_METHOD_POST = 2;
  HTTP_METHOD_PUT = 3;
}

enum OutputSource {
  OUTPUT_SOURCE_UNSPECIFIED = 0;
  OUTPUT_SOURCE_INPUT = 1;
  OUTPUT_SOURCE_ACTION = 2;
  OUTPUT_SOURCE_VERIFICATION = 3;
  OUTPUT_SOURCE_LITERAL = 4;
}

enum OutputTransform {
  OUTPUT_TRANSFORM_UNSPECIFIED = 0;
  OUTPUT_TRANSFORM_NONE = 1;
  OUTPUT_TRANSFORM_MILLISECONDS_TO_SECONDS = 2;
  OUTPUT_TRANSFORM_LAST_PATH_SEGMENT = 3;
}

message NamedString {
  string name = 1;
  string value = 2;
}

message DataField {
  string name = 1;
  DataValue value = 2;
}

message DataObject {
  repeated DataField fields = 1;
}

message DataList {
  repeated DataValue values = 1;
}

message DataValue {
  oneof kind {
    google.protobuf.NullValue null_value = 1;
    string string_value = 2;
    int64 int_value = 3;
    double double_value = 4;
    bool bool_value = 5;
    DataObject object_value = 6;
    DataList list_value = 7;
  }
}

message LoggingOptions {
  string sink = 1;
  string file_path = 2;
}

message McpServerDefinition {
  string name = 1;
  string version = 2;
  string title = 3;
  string description = 4;
  string website_url = 5;
  string instructions = 6;
}

message McpServiceDefinition {
  McpServerDefinition server = 1;
  repeated McpTransport transports = 2;
}

message ServiceDefinition {
  string id = 1;
  string description = 2;

  oneof config {
    McpServiceDefinition mcp = 10;
  }
}

message DeviceHttpConnection {
  string base_url = 1;
  repeated NamedString headers = 2;
  string version = 3;
  bool tls_enabled = 4;
}

message DeviceUartConnection {
  optional int32 baud_rate = 1;
  string port = 2;
  string framing = 3;
}

message DeviceEthernetConnection {
  string host = 1;
  optional int32 port = 2;
  string protocol = 3;
}

message DeviceBackendDefinition {
  string name = 1;
  string image_path = 2;
  string category_icon = 3;

  oneof connection {
    DeviceHttpConnection http = 10;
    DeviceUartConnection uart = 11;
    DeviceEthernetConnection ethernet = 12;
  }
}

message DatabaseSqlConnection {
  string dsn = 1;
  string dialect = 2;
  repeated NamedString parameters = 3;
}

message DatabaseBackendDefinition {
  string name = 1;
  string description = 2;

  oneof connection {
    DatabaseSqlConnection sql = 10;
  }
}

message FileTreeConnection {
  string root_path = 1;
  repeated string include_globs = 2;
  repeated string exclude_globs = 3;
  bool read_only = 4;
}

message FileBackendDefinition {
  string name = 1;
  string description = 2;

  oneof connection {
    FileTreeConnection tree = 10;
  }
}

message HttpRequestOperation {
  HttpMethod method = 1;
  string path = 2;
  repeated NamedString query = 3;
  repeated NamedString headers = 4;
  DataValue body = 5;
  repeated int32 success_statuses = 6;
}

message SqlQueryOperation {
  string statement = 1;
  repeated NamedString parameters = 2;
  string result_format = 3;
}

message FileReadOperation {
  string path = 1;
  string format = 2;
}

message FileListOperation {
  string path = 1;
  string glob = 2;
  bool recursive = 3;
}

message UartExchangeOperation {
  string command = 1;
  DataValue payload = 2;
}

message ActionDefinition {
  string id = 1;
  string description = 2;

  oneof operation {
    HttpRequestOperation http = 10;
    SqlQueryOperation sql = 11;
    FileReadOperation file_read = 12;
    FileListOperation file_list = 13;
    UartExchangeOperation uart = 14;
  }
}

message ValueExpectation {
  string json_pointer = 1;
  oneof matcher {
    DataValue equals = 2;
    string equals_input = 3;
  }
}

message PreconditionDefinition {
  string id = 1;
  string description = 2;
  string action = 3;
  ValueExpectation expect = 4;
}

message SetupStepDefinition {
  string id = 1;
  string description = 2;
  string for_precondition = 3;
  string action = 4;
}

message VerificationDefinition {
  string action = 1;
  ValueExpectation expect = 2;
  optional int32 attempts = 3;
  optional int32 delay_ms = 4;
  optional int32 success_delay_ms = 5;
}

message NormalizationRule {
  string raw_value = 1;
  DataValue mapped_value = 2;
}

message OutputFieldMapping {
  string name = 1;
  OutputSource source = 2;
  OutputTransform transform = 3;
  string json_pointer = 4;
  string input_name = 5;
  DataValue value = 6;
  repeated NormalizationRule normalize = 7;
  DataValue default_value = 8;
  bool required = 9;
}

message InputPropertyDefinition {
  string name = 1;
  string type = 2;
  DataValue minimum = 3;
  DataValue maximum = 4;
}

message InputSchema {
  string type = 1;
  repeated InputPropertyDefinition properties = 2;
  repeated string required = 3;
  optional bool additional_properties = 4;
}

message CapabilityDefinition {
  string id = 1;
  string name = 2;
  string description = 3;
  InputSchema input_schema = 4;
  repeated ActionDefinition actions = 5;
  repeated PreconditionDefinition preconditions = 6;
  repeated SetupStepDefinition setup = 7;
  string main_action = 8;
  VerificationDefinition verification = 9;
  repeated OutputFieldMapping output_fields = 10;
}

message ProjectDefinition {
  string name = 1;
  string description = 2;
  LoggingOptions logging = 3;
  repeated CapabilityDefinition capabilities = 4;
  repeated ServiceDefinition services = 5;

  oneof backend {
    DeviceBackendDefinition device = 20;
    DatabaseBackendDefinition database = 21;
    FileBackendDefinition file = 22;
  }
}
